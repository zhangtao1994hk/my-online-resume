name: "SRE Resume CI/CD"

on:
  push:
    branches:
      - main  # 只有推送到主分支时触发

jobs:

  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    
    # 配置访问 GCS 的权限
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 验证 Google Cloud 身份 (用于 GCS Backend)
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # 这里填上面步骤 3 生成的 provider 完整路径
          workload_identity_provider: 'projects/218989921076/locations/global/workloadIdentityPools/github-pool/providers/zhangtao1994hk'
          service_account: 'github-actions-sre@project-ef3e3c7b-875b-4ab7-a17.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
